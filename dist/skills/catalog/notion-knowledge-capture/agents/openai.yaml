interface:
  display_name: Notion Knowledge Capture
  short_description: Capture conversations and decisions into structured Notion pages; use when turning chats/notes
    into wiki entries, how-tos, decisions, or FAQs with…
  icon_small: ./assets/notion-small.svg
  icon_large: ./assets/notion.png
  default_prompt: Capture this conversation into structured Notion pages with decisions, action items, and owners
    when known.
dependencies:
  tools:
  - type: mcp
    value: notion
    description: Notion MCP server
    transport: streamable_http
    url: https://mcp.notion.com/mcp
