interface:
  display_name: CLI Creator
  short_description: Build a composable CLI for Codex from API docs, an OpenAPI spec, existing curl examples, an
    SDK, a web app, an admin tool, or a local script.
  default_prompt: Create a composable CLI from this source material, install it on PATH, test it from outside the
    source folder, and create a companion skill that teaches Codex when to use it.
