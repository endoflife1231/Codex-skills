interface:
  display_name: Figma Generate Design
  short_description: Use this skill alongside figma-use when the task involves translating an application page,
    view, or multi-section layout into Figma.
  icon_small: ./assets/figma-small.svg
  icon_large: ./assets/figma.png
  default_prompt: Use $figma-generate-design to build or update this screen in Figma using existing design system
    components and strong visual parity.
dependencies:
  tools:
  - type: mcp
    value: figma
    description: Figma MCP server
    transport: streamable_http
    url: https://mcp.figma.com/mcp
