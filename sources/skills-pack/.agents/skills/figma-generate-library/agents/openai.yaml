interface:
  display_name: Figma Generate Library
  short_description: Build or update a professional-grade design system in Figma from a codebase. Use when the user
    wants to create variables/tokens, build component…
  icon_small: ./assets/figma-small.svg
  icon_large: ./assets/figma.png
  default_prompt: Use $figma-generate-library to build or update a Figma design system library from the codebase,
    including tokens, components, and documentation.
dependencies:
  tools:
  - type: mcp
    value: figma
    description: Figma MCP server
    transport: streamable_http
    url: https://mcp.figma.com/mcp
